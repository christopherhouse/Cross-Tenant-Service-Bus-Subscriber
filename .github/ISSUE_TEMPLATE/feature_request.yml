name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!
        Describing the **problem you want to solve** (rather than jumping straight
        to a solution) helps us explore the best approach together.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? What limitation are you hitting?
      placeholder: "I find it frustrating that the function can't ... because ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: >
        Describe any alternative solutions or workarounds you have considered,
        and why they don't fully address the problem.
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      multiple: true
      options:
        - Python function code
        - Bicep infrastructure
        - CI/CD workflows
        - Documentation
        - Copilot agents
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: >
        Add any other context, screenshots, links to related issues, or
        references to Azure documentation that supports the request.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
