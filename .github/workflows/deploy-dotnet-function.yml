# deploy-dotnet-function.yml
#
# Builds and deploys the .NET 10 Azure Function App as a zip package directly
# to the Function App using the Kudu zip-deploy API
# (az functionapp deployment source config-zip).  No container registry or
# Docker daemon is required on the runner.
#
# Trigger
# ───────
# • Push to main that touches src/dotnet/** or the workflow file itself
# • Manual dispatch
#
# Required GitHub Secrets (same as deploy-infra.yml)
# ───────────────────────
# AZURE_CLIENT_ID
# AZURE_TENANT_ID
# AZURE_SUBSCRIPTION_ID
#
# Required GitHub Variables
# ─────────────────────────
# AZURE_RG_NAME                  – resource group that contains the Function App
# AZURE_DOTNET_FUNCTION_APP_NAME – name of the deployed .NET Function App (output
#                                  from infra deployment, e.g. func-sbsub-dev-dotnet)
# ENVIRONMENT_NAME               – deployment environment label (dev | test | prod)
#
# Derived (not separate variables)
# ────────────────────────────────
# Zip artifact: dotnet-function.zip (built from dotnet publish output, discarded after deploy)

name: Deploy .NET Function App

on:
  push:
    branches:
      - main
    paths:
      - 'src/dotnet/**'
      - '.github/workflows/deploy-dotnet-function.yml'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC federated credential login
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy .NET Function (Zip Deploy)
    runs-on: ubuntu-latest
    environment: ${{ vars.ENVIRONMENT_NAME || 'dev' }}

    env:
      PUBLISH_DIR: ./publish
      ZIP_ARTIFACT: dotnet-function.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install the .NET 10 SDK so that dotnet restore and dotnet test are available.
      # The wildcard patch version (10.0.x) ensures the latest 10.0 patch is used
      # without pinning to a specific patch release.
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Restore NuGet packages for the entire solution before running tests.
      # A separate restore step allows the subsequent test step to pass --no-restore,
      # avoiding redundant network calls and making the test step faster.
      - name: Restore NuGet packages
        run: dotnet restore src/dotnet/CrossTenantServiceBus.slnx

      - name: Run unit tests
        run: |
          dotnet test src/dotnet/CrossTenantServiceBus.slnx \
            --configuration Release \
            --no-restore

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Publish the .NET Function App to the PUBLISH_DIR directory in Release
      # configuration.  --no-restore is safe here because the Restore step above
      # already fetched all NuGet packages for the solution.
      - name: Publish .NET Function App
        run: |
          dotnet publish src/dotnet/FunctionApp/FunctionApp.csproj \
            --configuration Release \
            --output "${{ env.PUBLISH_DIR }}" \
            --no-restore

      # Zip the published output so it can be uploaded via the Kudu zip-deploy API.
      # working-directory scopes the shell to the publish directory so the archive
      # root contains the function binaries directly (no extra subfolder level).
      - name: Create deployment zip
        working-directory: ${{ env.PUBLISH_DIR }}
        run: zip -r "../${{ env.ZIP_ARTIFACT }}" .

      # Deploy the zip package to the Azure Function App using the Kudu zip-deploy
      # API.  This replaces the app content in-place and triggers a restart.
      - name: Deploy zip to Function App
        run: |
          az functionapp deployment source config-zip \
            --resource-group "${{ vars.AZURE_RG_NAME }}" \
            --name "${{ vars.AZURE_DOTNET_FUNCTION_APP_NAME }}" \
            --src "${{ env.ZIP_ARTIFACT }}"
