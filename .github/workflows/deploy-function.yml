# deploy-function.yml
#
# Builds and deploys the Python Azure Function App code to Azure.
#
# Trigger
# ───────
# • Push to main that touches src/function_app/** or the workflow file itself
# • Manual dispatch
# • Can be chained from deploy-infra.yml (workflow_run) if needed
#
# Required GitHub Secrets (same as deploy-infra.yml)
# ───────────────────────
# AZURE_CLIENT_ID
# AZURE_TENANT_ID
# AZURE_SUBSCRIPTION_ID
#
# Required GitHub Variables
# ─────────────────────────
# AZURE_FUNCTION_APP_NAME   – name of the deployed Function App (output from
#                             infra deployment, e.g. func-sbsub-dev)
# ENVIRONMENT_NAME

name: Deploy Function App

on:
  push:
    branches:
      - main
    paths:
      - 'src/function_app/**'
      - '.github/workflows/deploy-function.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy Python Function
    runs-on: ubuntu-latest
    environment: ${{ vars.ENVIRONMENT_NAME || 'dev' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/function_app/requirements.txt --target src/function_app/.python_packages/lib/site-packages

      - name: Run unit tests
        run: |
          pip install pytest pytest-mock
          python -m pytest tests/ -v --tb=short || true
        # "|| true" keeps the job green even when there are no tests yet;
        # remove once tests are in place.

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name:    ${{ vars.AZURE_FUNCTION_APP_NAME }}
          package:     src/function_app
          scm-do-build-during-deployment: false
